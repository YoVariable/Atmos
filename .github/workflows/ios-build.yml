name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v3
        with: { version: 10 }
        
      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - name: Install Dependencies
        run: pnpm install

      - name: Build Web App
        run: pnpm run build --filter weather-app

      - name: Sync Capacitor
        run: |
          pnpm add -D typescript@5
          pnpm exec cap sync

      - name: Build Unsigned App
        run: |
          # Build the App using the correct workspace path
          xcodebuild -workspace ios/App/App.xcodeproj/project.xcworkspace \
            -scheme App \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build
      - name: Package into IPA
        run: |
          # Create Payload directory and zip the app
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r Atmos.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Atmos-IPA
          path: Atmos.ipa